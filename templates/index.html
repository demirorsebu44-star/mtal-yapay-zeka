<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kulu MTAL - Yapay Zekâ Asistanı</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { display: flex; height: 100vh; background: linear-gradient(-45deg, #7928ca, #ff0080, #00dfd8, #007cf0); background-size: 400% 400%; animation: gradientBG 12s ease infinite; color: #fff; overflow: hidden; position: relative; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        /* Splash ve Arayüz CSS'in aynı şekilde kalıyor */
        .splash-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 20, 0.92); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.8s; }
        .app-container { display: flex; width: 100%; height: 100vh; backdrop-filter: blur(12px); background: rgba(10, 10, 20, 0.2); opacity: 0; transform: scale(0.96); transition: all 0.8s; }
        .app-active { opacity: 1; transform: scale(1); }
        .sidebar { width: 280px; background: rgba(15, 15, 25, 0.8); padding: 25px 15px; }
        .chat-area { flex: 1; display: flex; flex-direction: column; height: 100%; background: rgba(0, 0, 0, 0.15); }
        .chat-messages { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .message { max-width: 75%; padding: 14px 22px; font-size: 15px; border-radius: 25px; }
        .user-message { background: linear-gradient(135deg, #007cf0, #00dfd8); align-self: flex-end; }
        .bot-message { background: rgba(255, 255, 255, 0.07); align-self: flex-start; border: 1px solid rgba(255, 255, 255, 0.06); }
        .chat-input-container { padding: 25px 30px; border-top: 1px solid rgba(255, 255, 255, 0.08); display: flex; gap: 12px; }
        input { flex: 1; background: rgba(255, 255, 255, 0.06); border: none; padding: 12px; color: #fff; border-radius: 20px; }
    </style>
</head>
<body>

    <div class="splash-screen" id="splashScreen">
        <h2 class="splash-title">Kulu MTAL Yapay Zekâ Laboratuvarı</h2>
        <button class="basla-btn" onclick="isimKutusunuAc()">BAŞLA</button>
        <div id="nameInputBox" style="display:none;">
            <input type="text" id="kullaniciAdiInput" placeholder="Adını yaz kanka...">
            <button onclick="kontrolVeIlerle()">GİRİŞ YAP</button>
        </div>
    </div>

    <div class="app-container" id="appContainer">
        <div class="sidebar"><ul id="ozetListesi"></ul></div>
        <div class="chat-area">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-container">
                <input type="text" id="mesaj-input" placeholder="Bir şeyler yaz kanka...">
                <button onclick="mesajGonder()">Gönder</button>
            </div>
        </div>
    </div>

    <script>
        let globalKullaniciAdi = "Ziyaretçi";

        function isimKutusunuAc() { document.getElementById('nameInputBox').style.display = 'block'; }
        function kontrolVeIlerle() { 
            globalKullaniciAdi = document.getElementById('kullaniciAdiInput').value || "Ziyaretçi";
            document.getElementById('splashScreen').style.display = 'none';
            document.getElementById('appContainer').classList.add('app-active');
        }

        async function mesajGonder() {
            const input = document.getElementById('mesaj-input');
            const mesaj = input.value.trim();
            if (!mesaj) return;

            // Kullanıcı mesajını ekle
            const chatBox = document.getElementById('chatMessages');
            chatBox.innerHTML += `<div class="message user-message">${mesaj}</div>`;
            input.value = '';

            try {
                const formData = new FormData();
                formData.append('mesaj', mesaj);

                const response = await fetch('/chat', { method: 'POST', body: formData });
                const data = await response.json();

                if (data.cevap) {
                    chatBox.innerHTML += `<div class="message bot-message">${data.cevap}</div>`;
                } else {
                    chatBox.innerHTML += `<div class="message bot-message">Hata: ${data.error || 'Yanıt yok'}</div>`;
                }
            } catch (e) {
                chatBox.innerHTML += `<div class="message bot-message">Bağlantı koptu kanka!</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
