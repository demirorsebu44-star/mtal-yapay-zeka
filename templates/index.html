<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kulu MTAL - Yapay Zekâ Asistanı</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { display: flex; height: 100vh; background: linear-gradient(-45deg, #7928ca, #ff0080, #00dfd8, #007cf0); background-size: 400% 400%; animation: gradientBG 12s ease infinite; color: #fff; overflow: hidden; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(to bottom, #ff0080, #7928ca); border-radius: 10px; }

        .splash-screen { position: absolute; width: 100%; height: 100%; background: rgba(10, 10, 20, 0.92); backdrop-filter: blur(25px); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .app-container { display: flex; width: 100%; height: 100vh; opacity: 0; transform: scale(0.96); transition: all 0.8s; }
        .app-active { opacity: 1; transform: scale(1); }
        .sidebar, .info-menu { width: 280px; background: rgba(15, 15, 25, 0.6); backdrop-filter: blur(20px); padding: 25px; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: rgba(0,0,0,0.2); }
        .chat-messages { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .message { max-width: 75%; padding: 14px 22px; font-size: 15px; animation: slideUp 0.4s ease; }
        .user-message { background: #007cf0; align-self: flex-end; border-radius: 20px 20px 4px 20px; }
        .bot-message { background: rgba(255, 255, 255, 0.1); align-self: flex-start; border-radius: 20px 20px 20px 4px; border-left: 3px solid #00dfd8; }
        .toast-notification { position: fixed; top: 20px; right: 20px; background: rgba(0, 223, 216, 0.2); border: 1px solid #00dfd8; padding: 15px 25px; border-radius: 15px; backdrop-filter: blur(10px); z-index: 10000; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="splash-screen" id="splashScreen">
        <h2 style="margin-bottom: 20px;">Kulu MTAL Yapay Zekâ Laboratuvarı</h2>
        <input type="text" id="kullaniciAdiInput" placeholder="Adını yaz kanka..." style="padding: 10px; border-radius: 20px; border:none; text-align:center; margin-bottom: 10px; width: 250px;">
        <button onclick="kontrolVeIlerle()" style="padding: 10px 30px; border-radius: 20px; border:none; cursor:pointer;">GİRİŞ YAP</button>
    </div>

    <div class="app-container" id="appContainer">
        <div class="sidebar"><h3>Özetler</h3><ul id="ozetListesi" style="list-style:none; margin-top:15px;"></ul></div>
        <div class="chat-area">
            <div class="chat-header" style="padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1);"><h3>Asistan Paneli</h3></div>
            <div class="chat-messages" id="chatMessages"></div>
            <div style="padding: 20px; display:flex;">
                <input type="text" id="mesaj-input" style="flex:1; padding:15px; border-radius:30px; border:none;" placeholder="Mesajını yaz...">
                <button onclick="mesajGonder()" style="margin-left:10px; border-radius:50%; width:50px; border:none; cursor:pointer; background:#ff0080; color:#fff;"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
        <div class="info-menu"><h3>Proje Bilgi</h3><p style="margin-top:15px; font-size: 14px;">Kulu MTAL Asistanı aktif. Sistem hataya karşı korumalı modda çalışıyor.</p></div>
    </div>

    <script>
        const adminler = { "admin": "12345", "fatih": "123456", "mustafa": "1234567" };
        let adminAsamasi = false;
        let girisYapilanAdmin = "";

        function daktiloEfekti(element, metin, hiz = 25) {
            let i = 0;
            element.innerText = "";
            function yaz() {
                if (i < metin.length) {
                    element.innerText += metin.charAt(i);
                    i++;
                    setTimeout(yaz, hiz);
                }
            }
            yaz();
        }

        function botuSeslendir(metin) {
            if (!metin || typeof metin !== 'string') return;
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(metin.replace(/[\`\*\_#]/g, ""));
                utterance.lang = 'tr-TR';
                window.speechSynthesis.speak(utterance);
            }
        }

        function kontrolVeIlerle() {
            const input = document.getElementById('kullaniciAdiInput').value.toLowerCase().trim();
            if (!adminAsamasi && adminler.hasOwnProperty(input)) {
                adminAsamasi = true;
                girisYapilanAdmin = input;
                document.getElementById('kullaniciAdiInput').value = "";
                document.getElementById('kullaniciAdiInput').placeholder = "Şifreni gir yönetici...";
                document.getElementById('kullaniciAdiInput').type = "password";
                return;
            }
            if (adminAsamasi) {
                if (document.getElementById('kullaniciAdiInput').value === adminler[girisYapilanAdmin]) {
                    adminGirisBildirimi();
                    sistemiAc();
                } else { alert("Hatalı şifre!"); }
            } else {
                sistemiAc();
            }
        }

        function sistemiAc() {
            document.getElementById('splashScreen').style.display = 'none';
            document.getElementById('appContainer').classList.add('app-active');
            ekranaMesajEkle("Selam kanka! Kulu MTAL asistanı hazır. Sana nasıl yardımcı olabilirim?", 'bot-message');
        }

        function ekranaMesajEkle(metin, sınıfAdı) {
            const chatMessages = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `message ${sınıfAdı}`;
            chatMessages.appendChild(div);
            if (sınıfAdı === 'bot-message') {
                const span = document.createElement('span');
                div.appendChild(span);
                daktiloEfekti(span, metin);
                botuSeslendir(metin);
            } else {
                div.innerText = metin;
            }
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function mesajGonder() {
            const input = document.getElementById('mesaj-input');
            if(input.value.trim() === "") return;
            ekranaMesajEkle(input.value, 'user-message');
            const mesaj = input.value;
            input.value = "";
            
            // API isteği veya demo simülasyonu
            fetch('/chat', { method: 'POST', body: JSON.stringify({mesaj: mesaj}), headers: {'Content-Type': 'application/json'} })
            .then(res => res.json())
            .then(data => ekranaMesajEkle(data.cevap || "Cevap gelmedi kanka.", 'bot-message'))
            .catch(() => ekranaMesajEkle("Sunucu bağlantısı sağlanamadı, ama buradayım kanka!", 'bot-message'));
        }

        function adminGirisBildirimi() {
            const toast = document.createElement('div');
            toast.className = 'toast-notification';
            toast.innerHTML = '⚡ <b>Admin Modu:</b> Yetkili erişimi sağlandı.';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
    </script>
</body>
</html>
