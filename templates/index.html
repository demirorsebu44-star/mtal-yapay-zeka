<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kulu MTAL Yapay Zekâ Motoru</title>
    <!-- CSS ve diğer kütüphanelerin burada kalmalı -->
</head>
<body>

    <!-- Arayüz kodların burada (Splash, sidebar, vs.) -->

    <script>
        // ... (Değişkenlerin ve diğer fonksiyonların aynen kalsın)

        async function mesajGonder() {
            const mesajMetni = mesajInput.value.trim();
            if (mesajMetni === '' && !secilenDosya) return;

            const formData = new FormData();
            formData.append('mesaj', `(Kullanıcı adı: ${globalKullaniciAdi}) ` + mesajMetni);

            if (secilenDosya) {
                formData.append('fotoğraf', secilenDosya);
            }

            ekranaKullaniciMesajiBas(mesajMetni, secilenDosya);
            mesajInput.value = '';
            
            if(mesajMetni !== '') {
                ozetPanelineEkle(mesajMetni);
            } else if(secilenDosya) {
                ozetPanelineEkle("🖼️ Fotoğraf gönderildi");
            }
            fotoğrafİptalEt();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                // HATA YÖNETİMİ: undefined almamak için kontrol
                if (data.cevap) {
                    ekranaMesajEkle(data.cevap, 'bot-message');
                    botuSeslendir(data.cevap);
                } else if (data.error) {
                    ekranaMesajEkle("⚠️ Hata: " + data.error, 'bot-message');
                } else {
                    ekranaMesajEkle("Sistemden geçersiz yanıt geldi.", 'bot-message');
                }
            } catch (error) {
                console.error('Bağlantı Hatası:', error);
                ekranaMesajEkle("Sunucuya ulaşılamadı kanka.", 'bot-message');
            }
        }
    </script>
</body>
</html>
