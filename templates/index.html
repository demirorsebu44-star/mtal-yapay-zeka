<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kulu MTAL - Yapay Zekâ Asistanı</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { display: flex; height: 100vh; background: linear-gradient(-45deg, #7928ca, #ff0080, #00dfd8, #007cf0); background-size: 400% 400%; animation: gradientBG 12s ease infinite; color: #fff; overflow: hidden; position: relative; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .splash-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 20, 0.92); backdrop-filter: blur(25px); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.8s cubic-bezier(0.77, 0, 0.175, 1); }
        .name-input-box { display: none; flex-direction: column; gap: 15px; width: 340px; }
        .name-field { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2); padding: 14px 25px; border-radius: 30px; color: #fff; text-align: center; outline: none; }
        .app-container { display: flex; width: 100%; height: 100vh; opacity: 0; transform: scale(0.96); transition: all 0.8s cubic-bezier(0.77, 0, 0.175, 1); }
        .app-active { opacity: 1; transform: scale(1); }
        .sidebar { width: 280px; background: rgba(15, 15, 25, 0.8); backdrop-filter: blur(20px); border-right: 1px solid rgba(255, 255, 255, 0.08); padding: 25px 15px; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: rgba(0, 0, 0, 0.15); }
        .chat-messages { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .message { max-width: 75%; padding: 14px 22px; font-size: 15px; border-radius: 20px; }
        .user-message { background: linear-gradient(135deg, #007cf0, #00dfd8); align-self: flex-end; }
        .bot-message { background: rgba(255, 255, 255, 0.07); align-self: flex-start; }
        .chat-input-container { padding: 25px; border-top: 1px solid rgba(255, 255, 255, 0.08); display: flex; flex-direction: column; gap: 10px; }
        .input-wrapper { display: flex; align-items: center; background: rgba(255, 255, 255, 0.06); border-radius: 40px; padding: 10px; }
        #mesaj-input { flex: 1; background: transparent; border: none; color: #fff; padding: 10px; outline: none; }
        #gonder-btn { background: #ff0080; border: none; color: #fff; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
        .splash-exit { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>
    <div class="splash-screen" id="splashScreen">
        <h2 class="splash-title">Kulu MTAL Yapay Zekâ Laboratuvarı</h2>
        <button class="basla-btn" id="ilkBaslaBtn" onclick="isimKutusunuAc()">BAŞLA</button>
        <div class="name-input-box" id="nameInputBox">
            <input type="text" class="name-field" id="kullaniciAdiInput" placeholder="Adınızı yazın...">
            <button class="onayla-btn" onclick="kontrolVeIlerle()">SİSTEME GİRİŞ YAP</button>
        </div>
    </div>

    <div class="app-container" id="appContainer">
        <div class="sidebar">
            <ul id="ozetListesi"></ul>
        </div>
        <div class="chat-area">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-container">
                <div class="input-wrapper">
                    <input type="text" id="mesaj-input" placeholder="Bir şeyler sor kanka..." onkeypress="handleKeyPress(event)">
                    <button id="gonder-btn" onclick="mesajGonder()"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let globalKullaniciAdi = "Ziyaretçi";
        
        function isimKutusunuAc() {
            document.getElementById('ilkBaslaBtn').style.display = 'none';
            document.getElementById('nameInputBox').style.display = 'flex';
        }

        function kontrolVeIlerle() {
            const val = document.getElementById('kullaniciAdiInput').value.trim();
            if (val) {
                globalKullaniciAdi = val;
                document.getElementById('splashScreen').classList.add('splash-exit');
                document.getElementById('appContainer').classList.add('app-active');
            }
        }

        function botuSeslendir(metin) {
            // Hata engelleme: Sadece string ise ve boş değilse çalıştır
            if (!metin || typeof metin !== 'string') return;
            
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let temizMetin = metin.replace(/[\`\*\_#]/g, ""); 
                const utterance = new SpeechSynthesisUtterance(temizMetin);
                utterance.lang = 'tr-TR';
                window.speechSynthesis.speak(utterance);
            }
        }

        async function mesajGonder() {
            const input = document.getElementById('mesaj-input');
            const metin = input.value.trim();
            if (!metin) return;

            ekranaMesajEkle(metin, 'user-message');
            input.value = '';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ mesaj: `(${globalKullaniciAdi}) ` + metin })
                });
                const data = await response.json();
                ekranaMesajEkle(data.cevap, 'bot-message');
                botuSeslendir(data.cevap);
            } catch (e) {
                ekranaMesajEkle("Bağlantı hatası oluştu kanka.", 'bot-message');
            }
        }

        function ekranaMesajEkle(metin, sinif) {
            const div = document.createElement('div');
            div.className = `message ${sinif}`;
            div.innerText = metin;
            document.getElementById('chatMessages').appendChild(div);
        }

        function handleKeyPress(e) { if (e.key === 'Enter') mesajGonder(); }
    </script>
</body>
</html>
