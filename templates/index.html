<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTAL Yapay Zekâ Asistanı</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #111b21;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #e9edef;
        }

        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 95vh;
            background-color: #222e35;
            display: flex;
            flex-direction: column;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        /* Üst Menü / Header */
        .chat-header {
            background-color: #202c33;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #2f3b43;
        }

        .avatar {
            width: 45px;
            height: 45px;
            background-color: #00a884;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: white;
        }

        .bot-info h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .bot-info p {
            font-size: 12px;
            color: #8696a0;
        }

        /* Mesaj Alanı */
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay;
            background-color: #0b141a;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Mesaj Balonları */
        .message {
            max-width: 65%;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 14.5px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.user {
            background-color: #005c4b;
            color: #e9edef;
            align-self: flex-end;
            border-top-right-radius: 0;
        }

        .message.bot {
            background-color: #202c33;
            color: #e9edef;
            align-self: flex-start;
            border-top-left-radius: 0;
        }

        /* Alt Giriş Alanı */
        .chat-input-area {
            background-color: #202c33;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .file-upload-label {
            color: #8696a0;
            font-size: 22px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .file-upload-label:hover {
            color: #00a884;
        }

        #imageInput {
            display: none;
        }

        .input-box {
            flex: 1;
            background-color: #2a3942;
            border: none;
            outline: none;
            padding: 12px 16px;
            border-radius: 8px;
            color: #e9edef;
            font-size: 15px;
        }

        .send-btn {
            background: none;
            border: none;
            color: #8696a0;
            font-size: 22px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .send-btn:hover {
            color: #00a884;
        }

        /* Önizleme Alanı */
        .preview-container {
            display: none;
            padding: 8px 20px;
            background-color: #1f2c34;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #2f3b43;
        }

        .preview-img {
            max-height: 50px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div class="avatar">
            <i class="fa-solid fa-robot"></i>
        </div>
        <div class="bot-info">
            <h3>MTAL Gemini Asistanı</h3>
            <p>Çevrimiçi | Gelişmiş Yapay Zekâ</p>
        </div>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="message bot">
            Selam kanka! Bana sormak istediğin her şeyi yazabilir ya da ataç ikonuna tıklayarak bir fotoğraf gönderip onun hakkında sorular sorabilirsin.
        </div>
    </div>

    <div class="preview-container" id="previewContainer">
        <img src="" id="imagePreview" class="preview-img">
        <span style="font-size: 12px; color: #8696a0;">Görsel yüklendi, mesajınızla birlikte gönderilecek.</span>
    </div>

    <form id="chatForm" onsubmit="sendMessage(event)">
        <div class="chat-input-area">
            <label for="imageInput" class="file-upload-label">
                <i class="fa-solid fa-paperclip"></i>
            </label>
            <input type="file" id="imageInput" accept="image/*" onchange="previewImage()">

            <input type="text" id="userInput" class="input-box" placeholder="Bir mesaj yazın..." autocomplete="off" required>

            <button type="submit" class="send-btn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </form>
</div>

<script>
    // Resim seçildiğinde önizleme gösteren fonksiyon
    function previewImage() {
        const input = document.getElementById('imageInput');
        const previewContainer = document.getElementById('previewContainer');
        const previewImg = document.getElementById('imagePreview');

        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                previewImg.src = e.target.result;
                previewContainer.style.display = 'flex';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    // Mesaj Gönderme Fonksiyonu (Flask API'ne bağlanan kısım)
    async function sendMessage(event) {
        event.preventDefault();

        const userInput = document.getElementById('userInput');
        const imageInput = document.getElementById('imageInput');
        const chatMessages = document.getElementById('chatMessages');
        const previewContainer = document.getElementById('previewContainer');

        const messageText = userInput.value.trim();
        if (!messageText) return;

        // 1. Kullanıcı mesajını ekrana bas
        const userDiv = document.createElement('div');
        userDiv.className = 'message user';
        userDiv.textContent = messageText;
        chatMessages.appendChild(userDiv);

        // Girişleri temizle ve otomatik aşağı kaydır
        userInput.value = '';
        chatMessages.scrollTop = chatMessages.scrollHeight;

        // 2. Form verilerini hazırla (Fotoğraf varsa ekle)
        const formData = new FormData();
        formData.append('message', messageText);
        if (imageInput.files[0]) {
            formData.append('image', imageInput.files[0]);
        }

        // Önizlemeyi sıfırla
        previewContainer.style.display = 'none';
        imageInput.value = '';

        // 3. Bot için "Düşünüyor..." balonu ekle
        const botDiv = document.createElement('div');
        botDiv.className = 'message bot';
        botDiv.textContent = 'Yazıyor...';
        chatMessages.appendChild(botDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;

        try {
            // Flask backend'ine istek atıyoruz
            const response = await fetch('/chat', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            // 4. Botun gerçek cevabını ekrana yazdır
            if (data.response) {
                botDiv.textContent = data.response;
            } else if (data.error) {
                botDiv.textContent = "Hata oluştu: " + data.error;
            }
        } catch (error) {
            botDiv.textContent = "Sunucuya bağlanılamadı kanka.";
        }

        chatMessages.scrollTop = chatMessages.scrollHeight;
    }
</script>

</body>
</html>
