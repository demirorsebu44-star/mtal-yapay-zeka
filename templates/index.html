<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kulu MTAL - Yapay Zekâ Asistanı</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        /* CSS'in aynı kalacak, buraya tüm orijinal stilini ekle */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { display: flex; height: 100vh; background: linear-gradient(-45deg, #7928ca, #ff0080, #00dfd8, #007cf0); background-size: 400% 400%; animation: gradientBG 12s ease infinite; color: #fff; overflow: hidden; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        /* ... (Diğer tüm CSS kodlarını buraya yapıştır) ... */
    </style>
</head>
<body>

    <div class="splash-screen" id="splashScreen">...</div>
    <div class="app-container" id="appContainer">...</div>

    <script>
        let globalKullaniciAdi = "Ziyaretçi";
        let secilenDosya = null;
        let adminAsamasi = false; 

        // ... (isimKutusunuAc, kontrolVeIlerle, vb. fonksiyonların aynı kalsın)

        function mesajGonder() {
            const mesajMetni = mesajInput.value.trim();
            if (mesajMetni === '' && !secilenDosya) return;

            const formData = new FormData();
            formData.append('mesaj', mesajMetni);
            formData.append('kullanici', globalKullaniciAdi); // Kullanıcı adını buraya ekledik

            if (secilenDosya) {
                formData.append('fotoğraf', secilenDosya);
            }

            ekranaKullaniciMesajiBas(mesajMetni, secilenDosya);
            mesajInput.value = '';
            
            if(mesajMetni !== '') {
                ozetPanelineEkle(mesajMetni);
            } else if(secilenDosya) {
                ozetPanelineEkle("🖼️ Fotoğraf gönderildi");
            }
            fotoğrafİptalEt();

            // 500 hatasını yöneten düzeltilmiş kısım
            fetch('/chat', {
                method: 'POST',
                body: formData 
            })
            .then(response => {
                if (!response.ok) throw new Error('Sunucu Hatası: ' + response.status);
                return response.json();
            })
            .then(data => {
                ekranaMesajEkle(data.cevap, 'bot-message');
                botuSeslendir(data.cevap);
            })
            .catch(error => {
                console.error('Hata:', error);
                const hataMesaji = 'Bağlantı koptu kanka. Sunucunu ve API anahtarını kontrol et!';
                ekranaMesajEkle(hataMesaji, 'bot-message');
            });
        }

        // ... (Diğer fonksiyonların kalsın)
    </script>
</body>
</html>
